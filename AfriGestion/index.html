
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriGestion - Logiciel de Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            body { background-color: white !important; padding: 0 !important; color: #1e293b !important; }
            @page { 
                margin: 1cm 1.5cm; 
                size: A4 portrait;
            }
            
            /* Couleurs forcées pour l'impression */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            .report-card {
                border: 1px solid #e2e8f0;
                border-radius: 16px;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
                break-inside: avoid;
                background-color: #f8fafc !important;
            }
            
            .report-header {
                border-bottom: 5px solid #10b981;
                margin-bottom: 2rem;
                padding-bottom: 1.5rem;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
            
            .table-professional {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
            }
            
            .table-professional th {
                background-color: #1e293b !important;
                color: white !important;
                font-weight: 700;
                text-transform: uppercase;
                font-size: 10px;
                padding: 14px 15px;
                text-align: left;
            }
            
            .table-professional th:first-child { border-top-left-radius: 8px; }
            .table-professional th:last-child { border-top-right-radius: 8px; }
            
            .table-professional td {
                padding: 12px 15px;
                border-bottom: 1px solid #e2e8f0;
                font-size: 11px;
                color: #334155;
            }
            
            .table-professional tr:last-child td { border-bottom: none; }
            
            .badge-print {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 9999px;
                font-size: 9px;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .invoice-total-box {
                background-color: #10b981 !important;
                color: white !important;
                padding: 1.5rem;
                border-radius: 12px;
                text-align: right;
                width: 250px;
                margin-left: auto;
            }
        }
        .print-only { display: none; }
    </style>
<script type="importmap">

}

</head>

</body>
</html>
